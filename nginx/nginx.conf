upstream pastebin_app {
    server app:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS when behind a TLS terminator
    # Uncomment when you have a cert:
    # return 301 https://$host$request_uri;

    client_max_body_size 4m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://pastebin_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;

        # Basic rate limiting — 10 req/s per IP, burst 20
        limit_req zone=pastebin_limit burst=20 nodelay;
    }
}

# Rate limit zone — defined in http block (add to nginx.conf http {})
# limit_req_zone $binary_remote_addr zone=pastebin_limit:10m rate=10r/s;
