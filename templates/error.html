{% extends "base.html" %}
{% block title %}{{ status }} – PasteBin{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-24 text-center">
  <p class="text-7xl font-bold text-gray-700 mb-4">{{ status }}</p>
  <p class="text-gray-400 mb-6">{{ detail }}</p>
  <a href="/" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-medium transition">
    Create a new paste
  </a>
</div>
{% endblock %}
