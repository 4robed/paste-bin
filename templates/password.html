{% extends "base.html" %}
{% block title %}Protected Paste – PasteBin{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-xl text-center">
    <div class="text-4xl mb-4">🔒</div>
    <h1 class="text-xl font-semibold text-gray-100 mb-1">Password Protected</h1>
    <p class="text-sm text-gray-500 mb-6">Enter the password to view this paste.</p>

    {% if error %}
    <div class="mb-4 px-4 py-2 rounded-lg bg-red-900/40 border border-red-700 text-red-300 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/{{ short_code }}/unlock" class="space-y-4">
      <input
        type="password" name="password" autofocus required
        placeholder="••••••••"
        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-indigo-500 transition text-center"
      />
      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2 rounded-lg transition text-sm">
        Unlock
      </button>
    </form>
  </div>
</div>
{% endblock %}
